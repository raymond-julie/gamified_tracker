spring:
  application:
    name: api-gateway

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tracker_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      INDENT_OUTPUT: true

server:
  port: 8080

# JWT custom config (you will use this in JwtUtil)
jwt:
  secret: ma5ae3ae15600100f08d386259c14228b58cf9778e336adb61ce47835e473dad115a1138bd1ee005868199fdafec44293
  expiration: 86400000   # 1 day in ms

# Logging (very useful during dev)
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Actuator (optional but recommended)
management:
  endpoints:
    web:
      exposure:
        include: health,info

