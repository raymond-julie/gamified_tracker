spring:
  application:
    name: api-gateway

  output:
    ansi:
      enabled: ALWAYS

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: activity
              uri: lb://activity-service
              predicates:
                - Path=/api/activity/**,/api/activitylog/**
              filters:
                # activity-service's list/create endpoints are mapped at "/" and Spring 6 no
                # longer treats "/activity" and "/activity/" as equivalent, so the bare base
                # path needs an explicit trailing slash. Two mutually-exclusive rewrites
                # (each anchored, so only one ever matches a given request) replace StripPrefix.
                - RewritePath=^/api/(activity|activitylog)/?$, /$1/
                - RewritePath=^/api/(.*)$, /$1
            - id: gamification
              uri: lb://gamification-service
              predicates:
                - Path=/api/level/**,/api/threshold/**
              filters:
                - StripPrefix=1

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/tracker_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      INDENT_OUTPUT: true

server:
  port: 8080

# JWT custom config (you will use this in JwtUtil)
jwt:
  secret: ${JWT_SECRET:ma5ae3ae15600100f08d386259c14228b58cf9778e336adb61ce47835e473dad115a1138bd1ee005868199fdafec44293}
  expiration: ${JWT_EXPIRATION:86400000}   # 1 day in ms

# Logging (very useful during dev)
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %m%n%wEx"

# Actuator (optional but recommended)
management:
  endpoints:
    web:
      exposure:
        include: health,info

# Swagger/OpenAPI Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    metadata-map:
      zone: ap-south-1
      version: v1
